# Advanced takeover mode. Use only after the safe config in config.example.yaml
# has loaded successfully and the management page works.
#
# Docker note: config_path must be visible inside the CPA container/process.
# For the standard container workdir, use /CLIProxyAPI/config.yaml.

api-keys:
  - "sk-client-a"
  - "sk-client-b"

plugins:
  enabled: true
  dir: "plugins"
  configs:
    cpa-policy-hub:
      enabled: true
      priority: 1
      storage_path: "cpa-policy-hub-state.json"

      # Import top-level CPA api-keys and let this plugin authenticate them.
      traffic_enabled: true
      config_path: "/CLIProxyAPI/config.yaml"
      manage_config_api_keys: true
      exclusive: true
      fail_closed: false
      dry_run: false
      expose_limit_headers: false

      default_allowed_models: ["*"]
      default_daily_token_limit: 100000
      default_monthly_token_limit: 1000000
      default_request_limit_per_minute: 60

      auth:
        exclusive: true
        keys:
          # Optional runtime/static managed keys in addition to top-level api-keys.
          # Imported top-level CPA api-keys inherit the defaults above, then can be
          # overridden from the Policy Hub management page/state file.
          # - id: "team-a-dev"
          #   key_hash: "sha256:..."
          #   allowed_models: ["gpt-*", "claude-3-*"]
          #   denied_models: ["gpt-5-pro"]
          #   allowed_providers: ["openai", "claude"]
          #   daily_token_limit: 100000
          #   hourly_token_limit: 10000
          #   hourly_request_limit: 300
          #   request_limit_per_minute: 60
          #   time_windows:
          #     - timezone: "Asia/Shanghai"
          #       days: ["weekday"]
          #       start: "09:00"
          #       end: "23:00"
          #   request:
          #     set_headers:
          #       X-Team: "team-a"
            #   error_response:
            #     message: "Upstream returned an error. Try another model or contact support."
            #     set_headers:
            #       X-Policy-Hub-Error: "friendly"

      pricing: []
      policies:
        # Rewrite a client-facing alias to a real upstream model and force the
        # interface required by that upstream model.
        # - name: "route-alias-to-responses"
        #   match:
        #     providers: ["openai"]
        #     models: ["public-responses-alias"]
        #     request_paths: ["/chat/completions"]
        #   interface:
        #     force_interface: "responses"
        #   request:
        #     set_model: "real-upstream-responses-model"
      endpoint_overrides: []
