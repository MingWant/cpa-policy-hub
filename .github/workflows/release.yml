name: release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: windows
            goarch: amd64
            runner: windows-latest
            lib: cpa-policy-hub.dll
            asset: cpa-policy-hub-windows-amd64.zip
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
            lib: cpa-policy-hub.so
            asset: cpa-policy-hub-linux-amd64.zip
          - goos: linux
            goarch: arm64
            runner: ubuntu-24.04-arm
            lib: cpa-policy-hub.so
            asset: cpa-policy-hub-linux-arm64.zip
          - goos: darwin
            goarch: amd64
            runner: macos-13
            lib: cpa-policy-hub.dylib
            asset: cpa-policy-hub-darwin-amd64.zip
          - goos: darwin
            goarch: arm64
            runner: macos-14
            lib: cpa-policy-hub.dylib
            asset: cpa-policy-hub-darwin-arm64.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Windows C compiler
        if: matrix.goos == 'windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          path-type: inherit
          install: mingw-w64-x86_64-gcc

      - name: Build dynamic library
        shell: bash
        env:
          CGO_ENABLED: '1'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist/package
          go build -buildmode=c-shared -trimpath -ldflags="-s -w" -o "dist/package/${{ matrix.lib }}" .
          cp README.md RELEASE.md config.example.yaml registry.example.json dist/package/

      - name: Package artifact
        shell: pwsh
        run: |
          Compress-Archive -Path dist/package/* -DestinationPath "dist/${{ matrix.asset }}" -Force
          $hash = (Get-FileHash "dist/${{ matrix.asset }}" -Algorithm SHA256).Hash.ToLower()
          "$hash  ${{ matrix.asset }}" | Out-File -Encoding utf8 "dist/${{ matrix.asset }}.sha256"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: |
            dist/${{ matrix.asset }}
            dist/${{ matrix.asset }}.sha256

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.zip
            dist/*.sha256
          generate_release_notes: true
