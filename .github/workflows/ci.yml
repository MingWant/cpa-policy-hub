name: ci

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Format check
        run: |
          gofmt -w main.go
          git diff --exit-code -- main.go

      - name: Test
        run: go test ./...

      - name: Build Linux plugin
        env:
          CGO_ENABLED: '1'
          GOOS: linux
          GOARCH: amd64
        run: go build -buildmode=c-shared -trimpath -ldflags="-s -w" -o dist/cpa-policy-hub.so .
