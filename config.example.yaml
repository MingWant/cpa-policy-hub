plugins:
  enabled: true
  dir: "plugins"
  configs:
    cpa-policy-hub:
      enabled: true
      priority: 100
      storage_path: "cpa-policy-hub-state.json"
      # Safe default: management UI only. This does not read, authenticate,
      # intercept, mutate, rate-limit, or record normal CPA traffic.
      traffic_enabled: false
      exclusive: false
      config_path: ""
      manage_config_api_keys: false
      fail_closed: false
      dry_run: true
      expose_limit_headers: false
      default_daily_token_limit: 0
      default_monthly_token_limit: 0
      default_request_limit_per_minute: 0
      default_allowed_models: ["*"]

      # Add keys/policies only after verifying the management page works.
      auth:
        exclusive: false
        keys: []

      pricing: []
      policies: []
      endpoint_overrides: []
